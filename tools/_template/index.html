<style>
  /* --- Page shell: matches every other page so the header lines up.
         Do NOT change the column width here — edit --sw-maxw in tokens.css. --- */
  *{ box-sizing:border-box; }
  body{ margin:0; background:var(--bg); color:var(--ink); font-family:var(--sans);
        line-height:1.6; -webkit-font-smoothing:antialiased; }
  .wrap{ max-width:var(--sw-maxw,820px); margin:0 auto; padding:var(--sw-gutter,24px); }
  a{ color:var(--accentDeep); }

  /* --- Standard tool hero (the coral banner) --- */
  .toolhero{ display:flex; align-items:center; gap:16px; background:var(--coral-bg);
    border:1px solid var(--coral-line); border-radius:12px; box-shadow:inset 4px 0 0 var(--accent);
    padding:18px 22px 18px 24px; margin-bottom:18px; }
  .toolhero .ico{ width:52px; height:52px; border-radius:12px; background:#fff;
    border:1px solid var(--coral-line); display:flex; align-items:center; justify-content:center;
    flex:0 0 auto; color:var(--accentDeep); }
  .toolhero .ico svg{ width:26px; height:26px; display:block; }
  .toolhero .brand{ font-weight:700; font-size:24px; letter-spacing:-.02em; color:var(--ink); line-height:1.1; }
  .toolhero .brand .bot{ color:var(--accentDeep); }
  .toolhero .tagline{ color:#7A5048; font-size:14px; margin-top:3px; }

  /* --- Instructions panel --- */
  .orient{ background:var(--surface); border:1px solid var(--line); border-radius:12px; padding:18px 20px; margin-bottom:22px; }
  .orient .ohd{ font-size:12px; letter-spacing:.06em; text-transform:uppercase; color:var(--muted); font-weight:700; margin-bottom:10px; }
  .orient p{ font-size:14px; color:var(--ink); line-height:1.55; margin:0; }

  /* --- Your activity's own styles go here --- */

  /* --- Footer --- */
  .foot{ color:var(--muted); font-size:12.5px; margin-top:40px; border-top:1px solid var(--line); padding-top:16px; }
</style>
</head>
