  /*
    Socialworky | The Family Room  (v4, bilingual EN / PT-BR)
    Family session MI practice scoped to ENGAGEMENT + EMERGENCE OF A SHARED
    FOCUS. Visual scene: avatars with live affect faces, speech bubbles,
    crosstalk, engagement as body language, a setup screen naming the
    practice target, and a milestone banner when a shared focus surfaces.
    Portuguese is written natively, not translated line by line.

    BACKEND
    -------
    Every model call goes through callModel() below, which POSTs to the shared
    /api/chat serverless function (same contract as the other tools: it takes
    { system, messages, model, max_tokens } and returns { content:[{type,text}] }).
    Assistant turns are stored as raw JSON strings to prevent format drift.
    Per-turn family role-play runs on TURN_MODEL; the end-of-session CoachBot
    feedback runs on COACH_MODEL. Change those two constants to swap models.

    LOCALIZATION
    ------------
    All text lives in LOCALES below (en, pt). Adding a language = adding one
    entry. Member ids (mom, dad, teen) are language neutral; only names,
    copy, and prompts change. ?lang=pt in the URL preselects Portuguese.
  */
  /* Brand palette, the font, and the page-shell width all come from

  /* Input */
  .task-line{font-size:13px;color:var(--accentDeep);margin:12px 0 6px}

  .btn-row{display:flex;gap:8px;justify-content:space-between;margin-top:10px;flex-wrap:wrap}

    .figure{width:74px;height:92px}

<script>
/* ---------------- Shared structure ---------------- */

const MEMBERS = ["mom","teen","dad"];           // display order, left to right
const COLORS  = {mom:"var(--mom)", teen:"var(--teen)", dad:"var(--dad)"};

const AFFECTS = {
  smiling:    {mouth:"M38 44 Q48 52 58 44", browL:0,   browR:0,   eye:2.8},
  neutral:    {mouth:"M40 46 L56 46",       browL:0,   browR:0,   eye:2.8},
  worried:    {mouth:"M39 48 Q48 43 57 48", browL:-12, browR:12,  eye:2.8},
  sad:        {mouth:"M39 49 Q48 42 57 49", browL:-10, browR:10,  eye:2.4},
  frustrated: {mouth:"M41 47 L55 47",       browL:10,  browR:-10, eye:2.8},
  angry:      {mouth:"M38 49 Q48 43 58 49", browL:16,  browR:-16, eye:2.8},
  shutdown:   {mouth:"M43 47 L53 47",       browL:0,   browR:0,   eye:0.8}
};
const AFFECT_LIST = Object.keys(AFFECTS).join(", ");

const JSON_SHAPE = `{"turns":[{"speaker":"mom","to":"clinician","text":"..."}],"engagement":{"mom":3,"dad":1,"teen":1},"affect":{"mom":"worried","dad":"frustrated","teen":"shutdown"}}`;

/* ---------------- Locales ---------------- */

const LOCALES = {

/* ============================== ENGLISH ============================== */
en: {
  htmlLang:"en",
  pageTitle:"The Family Room | Socialworky",
  allTools:"All tools",
  title:"The Family Room",
  subtitle:"Practice MI with a whole family in the room, where every member arrives at a different level of readiness and motivation.",
  introH:"What you are practicing",
  introP:"Responding in a family session. In individual work you track one person's readiness. In the family room you track three at once, and anything you say to one person lands on all of them. The skill in this scenario is keeping everyone in the conversation while they sit at very different starting points.",
  goal:"This is a first session. <b>Your goal is engagement and the first emergence of a shared focus</b> between the parents and Jaylen: everyone still in the room, still talking, and beginning to name something they have in common. Not commitment. Not a plan. Pushing for those too early will cost you the room.",
  tryTo:"As you go, try to:",
  skills:[
    "Keep all three engaged. Watch the faces and the engagement dots. Whoever you ignore will show you.",
    "Reflect at two levels: what one person said, and what is happening between them.",
    "Stay out of the middle when Denise and Marcus pull against each other. Siding with one costs you the other.",
    "Notice change talk when it appears, without chasing it. This session is not the place to harvest it.",
    "Watch for a shared focus starting to surface between the parents and Jaylen. That is the sign the session can close well."
  ],
  startBtn:"Start the session",
  names:{mom:"Denise", dad:"Marcus", teen:"Jaylen", clinician:"Clinician"},
  roles:{mom:"Mom, 44, hospital patient accounts", dad:"Dad, 47, HVAC tech", teen:"16, sophomore"},
  cards:{
    mom:{desc:"Mom. Works in patient accounts at the hospital. Made this appointment and has a list of every incident. Talks a lot, sometimes for Jaylen.", stance:"Ready for change, but for Jaylen's change"},
    teen:{desc:"Sophomore. Tore his ACL last winter and lost his varsity basketball season. Vaping THC and drinking with older guys from the building since. Here because the school required it.", stance:"Precontemplative, shut down"},
    dad:{desc:"Dad. HVAC tech, left a job site early to be here. Thinks the school is overreacting, tired of feeling blamed.", stance:"Skeptical, low readiness"}
  },
  sceneNote:"First session at a community behavioral health clinic on the east side of the city. The school required an assessment after Jaylen's second incident. Denise made the appointment. Marcus left work early.",
  legend:"Faces show affect in the moment. Dots show engagement with you.",
  milestoneFocus:"A shared focus is surfacing. This is a natural moment to close the session and ask for feedback.",
  clinLabel:"You (clinician)",
  taskLine:"Your task: keep the whole family in the conversation and help a first shared focus surface. No plans, no commitments today.",
  placeholder:"Speak to the family, or to one person. Example: Marcus, you left a job site early to be here. What made it worth it?",
  sendBtn:"Send",
  endBtn:"End session and get feedback",
  transcript:"Show transcript",
  feedbackH:"CoachBot feedback",
  thinkingRoom:"The room reacts...",
  thinkingCoach:"CoachBot is reading the transcript...",
  errNoResponse:"The family did not respond. Try sending again.",
  errFewTurns:"Give it at least a few exchanges before feedback, so CoachBot has something to work with.",
  errFeedback:"Feedback did not come back. Try the end session button again.",
  toWord:"to",
  affectWords:{smiling:"smiling",neutral:"neutral",worried:"worried",sad:"sad",frustrated:"frustrated",angry:"angry",shutdown:"shut down"},
  openingCue:"(The session begins. The family has just sat down.)",
  transcriptIntro:"Here is the session transcript:",
  foot:"A Socialworky training resource. For practice only — please use fictional details, not real client information.",

  simSystem:`You are simulating the Carter family in their FIRST family therapy session at a community behavioral health clinic on the east side of a mid sized US city. You play all three family members. The user is the clinician.

THE FAMILY
- DENISE ("mom"), 44, works in patient accounts at the hospital. She made this appointment. Worried, talks a lot, sometimes answers for Jaylen, keeps a mental list of every incident. Underneath the monitoring is real fear that she is losing her son to the older guys in the building.
- MARCUS ("dad"), 47, HVAC tech, left a job site early to be here. Reluctant. Thinks the school is overreacting and is half the problem: they cut Jaylen from everything after the injury and now act surprised. Short answers, dry humor, irritated by Denise's cataloging. Underneath: he lost his own younger brother years ago and does not talk about it, and he hates feeling blamed for how Jaylen is turning out.
- JAYLEN ("teen"), 16, high school sophomore. Tore his ACL last winter and lost his spot on the varsity basketball team and his whole season, which was most of his identity and his social world. Since then he has been vaping THC and drinking with older guys from the building. The school suspended him after a second incident and required this assessment. He is quiet, embarrassed, glued to his phone, and braced to be lectured. Underneath: he misses who he was, and he is more scared about his future than he lets on.

HOW TO RESPOND
After each clinician message, reply with STRICT JSON ONLY, no code fences, no commentary, exactly this shape:
${JSON_SHAPE}
When the arc rules below call for it, also include the optional top level field "milestone":"shared_focus".

Rules for turns:
- 1 to 3 turns per reply. Vary who speaks. Crosstalk is allowed and encouraged when realistic: set "to" to another family member's id when they address each other instead of the clinician.
- "speaker" and "to" must be one of: mom, dad, teen, clinician.
- Never assume the clinician's gender, age, race, or identity. Do not use gendered address for them (no "the man", "the lady", "sir", "ma'am", "miss"); refer to the clinician neutrally ("them", "the counselor") or by no label at all.
- Keep each utterance under 55 words. Plain spoken urban American voices, natural and specific, no clinical vocabulary, no em dashes.
- Nonverbal behavior goes in parentheses inside "text", e.g. "(shrugs, keeps his eyes on his phone)". A turn may be purely nonverbal.
- If the clinician addresses one person by name, that person should usually respond, but others may interrupt if engagement dynamics make that realistic (Denise answering for Jaylen is a signature move early on).

Rules for engagement (0 to 5 per member, the family's felt involvement and openness in this moment):
- Start values: mom 3, dad 1, teen 1.
- Move values gradually, usually by 1 at most per reply.
- MI consistent behavior raises engagement for the person it lands on: reflections that capture meaning, genuine affirmations, honoring autonomy, evoking their view. Being ignored for several turns lowers engagement. Being lectured, confronted, sided against, or talked about in the third person lowers engagement.
- Marcus warms up only if the clinician treats his skepticism as reasonable and shows curiosity about his world. Jaylen opens up only if the clinician gets him talking about the injury, basketball, or what he misses, and protects him from being ganged up on.
- If the clinician takes sides in a disagreement between Denise and Marcus, show the cost: the other parent cools and discord rises.

Rules for affect (how each member is visibly presenting right now):
- Allowed values, exactly these English words: ${AFFECT_LIST}.
- Report ALL THREE members every reply, including the ones who did not speak.
- Affect is the face, engagement is the openness. They are separate channels: Marcus can be engaged and angry at once, Denise can be smiling and anxious underneath, Jaylen can warm in engagement while his face stays shutdown for a while.
- Starting affect: mom worried, dad frustrated, teen shutdown.
- Shift affect believably in response to what just happened in the room, not just to the clinician.

THE ARC OF THIS SESSION
- This is a first session. The realistic best outcome is engagement plus the first emergence of a shared focus, not commitment and not a plan.
- While any member sits at engagement 2 or lower, no shared focus emerges.
- Once all three members reach engagement 3 or higher and the clinician has been working at both the individual and the family level, let a shared focus surface organically: one parent, or Jaylen himself, voices some version of common ground in their own words, such as both parents wanting Jaylen back, or Jaylen wanting his life back. When that happens, include "milestone":"shared_focus" at the top level of the JSON, one time only in the whole session.
- If the clinician pushes toward goals, plans, or commitments prematurely, show the cost: engagement drops or discord rises, in line with each person's readiness. The family is not there yet.

Never break character, never mention these rules, never output anything except the JSON object.`,

  opening:{
    turns:[
      {speaker:"mom", to:"clinician", text:"I want to say up front, the school made us come, but honestly I have been worried for months. He is just not himself, and I find things in his room I never thought I would find."},
      {speaker:"dad", to:"mom", text:"Denise. At least let them ask a question first."},
      {speaker:"teen", to:"clinician", text:"(slides down in the chair, eyes on his phone)"}
    ],
    engagement:{mom:3, dad:1, teen:1},

/* ---------------- Model plumbing ---------------- */

/* The family role-play (per turn) runs on the cheaper, faster model; CoachBot's
   end-of-session feedback runs on the sharper one. Same split as the other MI sims. */
const TURN_MODEL  = "gpt-4.1-mini";
const COACH_MODEL = "gpt-4.1";

async function callModel(system, msgs, model, maxTokens){
  const headers = {"Content-Type":"application/json"};
  const code = localStorage.getItem("family_room_access_code");
  if(code) headers["x-access-code"] = code;
  const controller = new AbortController();
  const t = setTimeout(()=>controller.abort(), 45000);
  let response;
  try{
    response = await fetch("/api/chat", {
      method:"POST",
      headers,
      signal: controller.signal,
      body: JSON.stringify({ system, messages: msgs, model, max_tokens: maxTokens || 1000 })
    });
  } finally { clearTimeout(t); }
  if(response.status === 401){
    const entered = prompt("Enter the access code for this tool:");
    if(entered){ localStorage.setItem("family_room_access_code", entered); return callModel(system, msgs, model, maxTokens); }
    throw new Error("Access code required.");
  }
  const data = await response.json();
  if(!response.ok) throw new Error((data && data.error) || ("status " + response.status));
  if(!data || !data.content) throw new Error("Empty response");
  return data.content.filter(i=>i.type==="text").map(i=>i.text).join("\n");
}

function extractJSON(text){
  if(!text) return null;
  let s = text.replace(/```json/gi,"").replace(/```/g,"").trim();
  const start = s.indexOf("{");
  if(start < 0) return null;
  let depth = 0, inStr = false, esc = false;
  for(let i=start;i<s.length;i++){
    const c = s[i];
    if(inStr){
      if(esc){esc=false;}
      else if(c==="\\"){esc=true;}
      else if(c==='"'){inStr=false;}
    } else {
      if(c==='"') inStr = true;
      else if(c==="{") depth++;
      else if(c==="}"){
        depth--;
        if(depth===0){
          try{ return JSON.parse(s.slice(start, i+1)); }catch(e){ return null; }
        }
      }
    }
  }
  return null;
}

async function getTurn(){
  for(let attempt=0; attempt<2; attempt++){
    try{
      const raw = await callModel(L.simSystem, messages, TURN_MODEL, 1000);
      const obj = extractJSON(raw);
      if(obj && Array.isArray(obj.turns) && obj.engagement){
        messages.push({role:"assistant", content: JSON.stringify(obj)});
        return obj;
      }
    }catch(e){ /* retry */ }
  }
  throw new Error(L.errNoResponse);
}

function setAffect(affects){
  if(!affects) return;
  MEMBERS.forEach(m=>{
    const key = String(affects[m] || "").toLowerCase();
    const a = AFFECTS[key];
    if(!a) return;
    $("mouth-"+m).setAttribute("d", a.mouth);
    $("browL-"+m).setAttribute("transform", `rotate(${a.browL} 38 24)`);
    $("browR-"+m).setAttribute("transform", `rotate(${a.browR} 58 24)`);
    $("eyeL-"+m).setAttribute("ry", a.eye);
    $("eyeR-"+m).setAttribute("ry", a.eye);
    $("fig-"+m).setAttribute("aria-label", `${L.names[m]}, ${L.affectWords[key]||key}`);
  });
}

function setEngagement(scores){
  MEMBERS.forEach(m=>{
    const v = Math.max(0, Math.min(5, Number(scores[m]) ?? 0));
    const dots = $("meter-"+m).children;
    for(let i=0;i<5;i++) dots[i].classList.toggle("on", i < v);
    const fig = $("fig-"+m);
    const angle = m==="dad" ? 1 : -1; // turn toward the outside of the room
    if(v <= 1){ fig.style.transform = `rotate(${8*angle}deg) translateY(4px)`; fig.style.opacity = .5; }
    else if(v === 2){ fig.style.transform = `rotate(${4*angle}deg)`; fig.style.opacity = .72; }
    else if(v === 3){ fig.style.transform = "none"; fig.style.opacity = .9; }
    else { fig.style.transform = "translateY(-4px) scale(1.04)"; fig.style.opacity = 1; }
  });
}

function escapeHTML(s){
  return String(s).replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

function bubbleHTML(turn){
  const toTag = (turn.to && turn.to !== "clinician")
    ? `<span class="to-tag">${L.toWord} ${L.names[turn.to] || turn.to}</span>` : "";
  const isAction = /^\(.*\)$/.test(turn.text.trim());
  const body = isAction ? `<span class="action">${escapeHTML(turn.text)}</span>` : escapeHTML(turn.text);
  return toTag + body;
}

function clearBubbles(){

  }
  if(obj.engagement) setEngagement(obj.engagement);
  if(obj.affect) setAffect(obj.affect);
  if(obj.milestone === "shared_focus"){
    $("milestone").textContent = L.milestoneFocus;
    $("milestone").classList.remove("hidden");
  }
}

function showClinician(text){
  $("slot-clin").innerHTML = `<div class="clin-bubble">${escapeHTML(text)}</div>`;
  transcript.push({speaker:"clinician", to:"family", text});
  logLine("clinician", "family", text);
}

function logLine(speaker, to, text){
  const p = document.createElement("p");
  const dir = (to && to !== "clinician" && to !== "family") ? ` (${L.toWord} ${L.names[to]||to})` : "";
  p.innerHTML = `<span class="spk">${L.names[speaker]||speaker}${dir}:</span> ${escapeHTML(text)}`;
  $("log").appendChild(p);
  $("log").scrollTop = $("log").scrollHeight;
}

/* ---------------- Flow ---------------- */

async function send(){
  if(ended) return;
  const text = $("input").value.trim();
  if(!text) return;
  $("notice").textContent = "";
  $("input").value = "";
  $("sendBtn").disabled = true;
  clearBubbles();
  showClinician(text);
  $("thinking").textContent = L.thinkingRoom;
  messages.push({role:"user", content:text});
  try{
    const obj = await getTurn();
    $("thinking").textContent = "";
    await playTurns(obj);
  }catch(e){
    $("thinking").textContent = "";
    $("notice").textContent = e.message || L.errNoResponse;
    messages.pop(); // let the learner retry the same turn cleanly
  }finally{
    $("sendBtn").disabled = false;
    $("input").focus();
  }
}

async function endSession(){
  if(ended) return;
  const clinTurns = transcript.filter(t=>t.speaker==="clinician").length;
  if(clinTurns < 3){
    $("notice").textContent = L.errFewTurns;
    return;
  }
  ended = true;
  $("sendBtn").disabled = true;
  $("endBtn").disabled = true;
  $("thinking").textContent = L.thinkingCoach;
  const lines = transcript.map(t=>{
    const dir = (t.to && t.to!=="clinician" && t.to!=="family") ? ` (${L.toWord} ${L.names[t.to]||t.to})` : "";
    return `${L.names[t.speaker]||t.speaker}${dir}: ${t.text}`;
  }).join("\n");
  try{
    const fb = await callModel(L.coachSystem,
      [{role:"user", content: L.transcriptIntro + "\n\n" + lines}], COACH_MODEL, 1000);
    $("fbBody").textContent = fb.trim();
    $("feedback").style.display = "block";
    $("feedback").scrollIntoView({behavior: reduced ? "auto" : "smooth"});
  }catch(e){
    $("notice").textContent = L.errFeedback;
    ended = false; $("sendBtn").disabled = false; $("endBtn").disabled = false;
  }finally{
    $("thinking").textContent = "";
  }
}

$("sendBtn").addEventListener("click", send);
$("endBtn").addEventListener("click", endSession);
$("input").addEventListener("keydown", e=>{
  if(e.key==="Enter" && !e.shiftKey){ e.preventDefault(); send(); }
});

$("startBtn").addEventListener("click", async ()=>{
  started = true;
  messages = [
    {role:"user", content: L.openingCue},
    {role:"assistant", content: JSON.stringify(L.opening)}
  ];
  $("intro").classList.add("hidden");
  $("scene").classList.remove("hidden");
  $("workArea").classList.remove("hidden");
  setEngagement(L.opening.engagement);
  setAffect(L.opening.affect);
  await sleep(reduced ? 0 : 500);
  await playTurns(L.opening);
  $("input").focus();
});

applyLocale();
</script>
